<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dograh AI Voice Assistant</title>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --bg-dark: #020617;
      --card-bg: rgba(255,255,255,0.05);
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      position: relative;
    }

    /* Background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      animation: float 8s infinite ease-in-out alternate;
    }

    .blob-1 {
      width: 350px;
      height: 350px;
      background: var(--primary);
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: var(--secondary);
      bottom: -80px;
      right: -80px;
      animation-delay: -4s;
    }

    @keyframes float {
      0% {
        transform: translate(0,0) scale(1);
      }
      100% {
        transform: translate(30px,50px) scale(1.1);
      }
    }

    .container {
      width: 90%;
      max-width: 500px;
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(to right, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-size: 0.95rem;
    }

    .voice-circle {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(99,102,241,0.5);
      transition: 0.3s ease;
    }

    .voice-circle:hover {
      transform: scale(1.05);
    }

    .voice-circle svg {
      width: 65px;
      height: 65px;
      fill: white;
      z-index: 2;
    }

    /* Ripple animation */
    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(99,102,241,0.6);
      animation: ripple 2.2s infinite;
    }

    .ripple:nth-child(2) {
      animation-delay: 0.7s;
    }

    .ripple:nth-child(3) {
      animation-delay: 1.4s;
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.7;
      }
      100% {
        transform: scale(1.9);
        opacity: 0;
      }
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(16,185,129,0.1);
      color: #34d399;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(52,211,153,0.5);
      }
      70% {
        box-shadow: 0 0 0 8px rgba(52,211,153,0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(52,211,153,0);
      }
    }

    .info {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #64748b;
    }

    .btn {
      margin-top: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .error-box {
      margin-top: 20px;
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      display: none;
      text-align: left;
    }

  </style>
</head>

<body>

  <!-- Background -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Main Card -->
  <div class="container">

    <div class="logo">Dograh AI</div>

    <div class="subtitle">
      AI Voice Assistant Ready To Help You
    </div>

    <!-- Voice Circle -->
    <div class="voice-circle">

      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>

      <!-- Mic SVG -->
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>

    </div>

    <!-- Status -->
    <div class="status">
      <span class="status-dot"></span>
      Voice Service Online
    </div>

    <div class="info">
      Click the Dograh widget in the bottom corner to begin speaking with the AI assistant.
    </div>

    <button class="btn" onclick="testAPI()">
      Test API Connection
    </button>

    <div class="error-box" id="errorBox"></div>

    <div class="footer">
      Powered by Dograh AI
    </div>

  </div>

  <!-- API Test -->
  <script>
    async function testAPI() {

      const errorBox = document.getElementById("errorBox");

      try {

        const response = await fetch(
          "https://api.dograh.com/api/v1/public/embed/config/emb_5S0SJcWvecvUb6XnuoxLV1Q5W4oEYMKJjiDJ3OgVHaE"
        );

        const data = await response.json();

        console.log("API SUCCESS:");
        console.log(data);

        errorBox.style.display = "block";
        errorBox.style.background = "rgba(16,185,129,0.1)";
        errorBox.style.color = "#6ee7b7";
        errorBox.innerHTML =
          "API Working Successfully.<br><br>Check browser console for response.";

      } catch (error) {

        console.error(error);

        errorBox.style.display = "block";
        errorBox.innerHTML = `
          <strong>CORS Error:</strong><br><br>
          The API works in Postman and terminal but browser blocks it because Dograh API does not allow localhost origin.<br><br>
          Solutions:
          <br>• Deploy site on Vercel/Netlify
          <br>• Ask Dograh to whitelist localhost
          <br>• Use backend proxy
        `;
      }
    }
  </script>

  <!-- Dograh Widget -->
  <script>
    (function(d, s, id) {

      var js, fjs = d.getElementsByTagName(s)[0];

      if (d.getElementById(id)) return;

      js = d.createElement(s);
      js.id = id;

      js.src =
      'https://app.dograh.com/embed/dograh-widget.js?token=emb_5S0SJcWvecvUb6XnuoxLV1Q5W4oEYMKJjiDJ3OgVHaE&environment=production&apiEndpoint=https://api.dograh.com';

      js.async = true;

      fjs.parentNode.insertBefore(js, fjs);

    }(document, 'script', 'dograh-widget'));
  </script>

</body>
</html>
